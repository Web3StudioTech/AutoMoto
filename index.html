<style>
/* ============================================================
   AUTOJAGA — DESIGN TOKENS
   Concept: workshop instrument cluster. Asphalt + hazard amber.
   Display: Big Shoulders Display (condensed/stencil, signage-like)
   Body: Inter | Data/plates/odometer: JetBrains Mono
   ============================================================ */
:root{
  /* dark (default — workshop floor at night) */
  --bg:#14181C;
  --bg-elev:#1A1F25;
  --surface:#1E242B;
  --surface-2:#252C34;
  --border:#323B45;
  --border-soft:#262E36;
  --text:#F4F1EA;
  --text-dim:#9AA5B1;
  --text-faint:#5C6773;

  --amber:#FF7A33;
  --amber-dim:#B85A26;
  --amber-glow:rgba(255,122,51,.18);
  --teal:#3DDC97;
  --teal-dim:rgba(61,220,151,.16);
  --red:#E8495C;
  --red-dim:rgba(232,73,92,.16);
  --blue:#4FA3E0;
  --blue-dim:rgba(79,163,224,.16);

  --gauge-track:#2A323B;
  --font-display:'Big Shoulders Display',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;

  --radius:10px;
  --radius-sm:6px;
  --shadow:0 8px 24px rgba(0,0,0,.35);
  --shadow-sm:0 2px 8px rgba(0,0,0,.25);
}
html[data-theme="light"]{
  --bg:#F2EFE8;
  --bg-elev:#FAF8F3;
  --surface:#FFFFFF;
  --surface-2:#F5F2EA;
  --border:#E1DBCC;
  --border-soft:#EAE5D9;
  --text:#1C2024;
  --text-dim:#5C6773;
  --text-faint:#9AA5B1;
  --gauge-track:#E1DBCC;
  --shadow:0 8px 24px rgba(28,32,36,.10);
  --shadow-sm:0 2px 8px rgba(28,32,36,.06);
}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
  transition:background .25s ease,color .25s ease;
}
::selection{background:var(--amber); color:#14181C;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}

.mono{font-family:var(--font-mono);}
.hidden{display:none !important;}

/* ---------- texture: subtle diagonal hazard stripe utility ---------- */
.hazard-edge{
  height:4px;
  background:repeating-linear-gradient(135deg,var(--amber) 0 10px, #14181C 10px 20px);
  opacity:.85;
}

/* ============================================================
   APP SHELL
   ============================================================ */
#app{display:flex; flex-direction:column; height:100vh; overflow:hidden;}

/* ---- Boot / portal picker ---- */
#boot{
  position:fixed; inset:0; z-index:500;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:28px;
  padding:24px;
}
#boot .mark{
  display:flex; align-items:center; gap:14px;
}
#boot .mark .gauge-ico{width:54px; height:54px;}
#boot .mark h1{
  font-family:var(--font-display); font-weight:800; font-size:42px;
  letter-spacing:.5px; text-transform:uppercase; line-height:.9;
}
#boot .mark h1 span{color:var(--amber);}
#boot .tag{color:var(--text-dim); font-size:14px; text-align:center; max-width:380px;}
.portal-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; width:100%; max-width:760px;}
.portal-card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:22px 18px; text-align:left; color:var(--text);
  display:flex; flex-direction:column; gap:10px;
  transition:.18s ease; position:relative; overflow:hidden;
}
.portal-card:hover{border-color:var(--amber); transform:translateY(-2px); box-shadow:var(--shadow);}
.portal-card .pi{font-size:26px;}
.portal-card .pt{font-family:var(--font-display); font-weight:700; font-size:22px; text-transform:uppercase; letter-spacing:.3px;}
.portal-card .pd{font-size:12.5px; color:var(--text-dim); line-height:1.4;}
.portal-card .ptag{
  position:absolute; top:14px; right:14px; font-size:9.5px; font-family:var(--font-mono);
  text-transform:uppercase; letter-spacing:.6px; color:var(--text-faint);
}
@media (max-width:720px){.portal-grid{grid-template-columns:1fr;}}

/* ---- Top bar ---- */
#topbar{
  display:flex; align-items:center; gap:14px;
  padding:0 18px; height:56px; min-height:56px;
  background:var(--bg-elev); border-bottom:1px solid var(--border-soft);
  flex-shrink:0;
}
#topbar .brand{display:flex; align-items:center; gap:9px; cursor:pointer;}
#topbar .brand svg{width:24px; height:24px;}
#topbar .brand b{font-family:var(--font-display); font-weight:800; font-size:19px; text-transform:uppercase; letter-spacing:.4px;}
#topbar .brand b span{color:var(--amber);}
#topbar .sep{width:1px; height:22px; background:var(--border); margin:0 2px;}
#topbar .role-pill{
  font-size:11px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.6px;
  color:var(--text-dim); border:1px solid var(--border); padding:4px 9px; border-radius:20px;
}
#topbar .branch-sel{
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  font-size:12.5px; padding:6px 10px; border-radius:var(--radius-sm);
}
#topbar .spacer{flex:1;}
#topbar .icon-btn{
  width:34px; height:34px; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--surface); color:var(--text-dim); display:flex; align-items:center; justify-content:center;
  font-size:14px; transition:.15s;
}
#topbar .icon-btn:hover{color:var(--text); border-color:var(--amber);}
#topbar .lang-sel{
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  font-size:12px; padding:6px 8px; border-radius:var(--radius-sm); font-family:var(--font-mono);
}
.exit-portal{font-size:11.5px; color:var(--text-dim); text-decoration:underline; cursor:pointer; white-space:nowrap;}
.exit-portal:hover{color:var(--amber);}
.sync-pill{
  font-size:10.5px; font-family:var(--font-mono); color:var(--text-faint); border:1px solid var(--border);
  padding:3px 9px; border-radius:20px; white-space:nowrap; transition:.2s;
}
.sync-pill.live{color:var(--teal); border-color:var(--teal);}
.sync-pill.err{color:var(--red); border-color:var(--red);}

/* ---- Main layout ---- */
#main-wrap{flex:1; display:flex; overflow:hidden;}
#sidebar{
  width:212px; flex-shrink:0; background:var(--bg-elev); border-right:1px solid var(--border-soft);
  display:flex; flex-direction:column; padding:14px 10px; gap:2px; overflow-y:auto;
}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:var(--radius-sm);
  color:var(--text-dim); font-size:13px; font-weight:500; transition:.15s;
}
.nav-item:hover{background:var(--surface); color:var(--text);}
.nav-item.active{background:var(--amber-glow); color:var(--amber);}
.nav-item .ni{width:17px; text-align:center; font-size:14px;}
.nav-sec{font-size:10px; text-transform:uppercase; letter-spacing:.8px; color:var(--text-faint); padding:14px 11px 5px;}

#content{flex:1; overflow-y:auto; padding:22px 26px 60px;}
@media (max-width:880px){
  #sidebar{position:fixed; left:-220px; top:56px; bottom:0; z-index:80; transition:left .2s; box-shadow:var(--shadow);}
  #sidebar.open{left:0;}
  #content{padding:14px 14px 80px;}
}

.view{display:none;}
.view.active{display:block; animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

.page-head{display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin-bottom:18px; flex-wrap:wrap;}
.page-head h2{font-family:var(--font-display); font-weight:800; font-size:28px; text-transform:uppercase; letter-spacing:.3px;}
.page-head .sub{color:var(--text-dim); font-size:13px; margin-top:2px;}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex; align-items:center; gap:7px; padding:9px 16px; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; font-weight:600;
  transition:.15s;
}
.btn:hover{border-color:var(--amber);}
.btn-primary{background:var(--amber); border-color:var(--amber); color:#1A1207;}
.btn-primary:hover{background:#FF8A4D; box-shadow:0 0 0 3px var(--amber-glow);}
.btn-ghost{background:transparent;}
.btn-sm{padding:6px 11px; font-size:12px;}
.btn-danger{color:var(--red); border-color:var(--red-dim);}
.btn-danger:hover{background:var(--red-dim);}
.btn:disabled{opacity:.4; cursor:not-allowed;}
.btn-block{width:100%; justify-content:center;}

/* ---------- cards / grids ---------- */
.grid{display:grid; gap:14px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
@media (max-width:1100px){.g4{grid-template-columns:repeat(2,1fr);}}
@media (max-width:680px){.g4,.g3,.g2{grid-template-columns:1fr;}}

.card{
  background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius);
  padding:16px;
}
.card-tight{padding:12px 14px;}

/* ---------- KPI / gauge cards ---------- */
.kpi-card{display:flex; align-items:center; gap:14px;}
.kpi-card .gauge-wrap{flex-shrink:0;}
.kpi-card .kt{font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-dim); margin-bottom:4px;}
.kpi-card .kv{font-family:var(--font-display); font-weight:800; font-size:30px; line-height:1;}
.kpi-card .kn{font-size:11.5px; color:var(--text-faint); margin-top:3px;}

/* ---------- status badges ---------- */
.badge{
  display:inline-flex; align-items:center; gap:5px; font-size:10.5px; font-weight:700; text-transform:uppercase;
  letter-spacing:.4px; padding:3px 8px; border-radius:20px;
}
.badge-ok{background:var(--teal-dim); color:var(--teal);}
.badge-warn{background:var(--amber-glow); color:var(--amber);}
.badge-bad{background:var(--red-dim); color:var(--red);}
.badge-info{background:var(--blue-dim); color:var(--blue);}
.badge-dot{width:6px; height:6px; border-radius:50%; background:currentColor;}

/* ---------- forms ---------- */
.field{display:flex; flex-direction:column; gap:5px; margin-bottom:12px;}
.field label{font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--text-dim); font-weight:600;}
.field input, .field select, .field textarea{
  background:var(--bg-elev); border:1px solid var(--border); color:var(--text);
  padding:9px 11px; border-radius:var(--radius-sm); font-size:13.5px; width:100%;
}
.field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--amber);}
.field textarea{resize:vertical; min-height:64px;}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}
.field-hint{font-size:11px; color:var(--text-faint);}

/* ---------- table ---------- */
table{width:100%; border-collapse:collapse; font-size:13px;}
th{
  text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-faint);
  padding:8px 10px; border-bottom:1px solid var(--border); font-weight:600;
}
td{padding:10px; border-bottom:1px solid var(--border-soft); vertical-align:middle;}
tr:hover td{background:var(--surface-2);}
.tbl-wrap{overflow-x:auto; border:1px solid var(--border-soft); border-radius:var(--radius);}
.tbl-wrap table{min-width:600px;}

/* ---------- modal ---------- */
.modal-bg{
  position:fixed; inset:0; background:rgba(10,12,14,.6); backdrop-filter:blur(2px);
  z-index:300; display:flex; align-items:center; justify-content:center; padding:18px;
  opacity:0; pointer-events:none; transition:.18s;
}
.modal-bg.show{opacity:1; pointer-events:all;}
.modal{
  background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius);
  width:100%; max-width:560px; max-height:88vh; overflow-y:auto; box-shadow:var(--shadow);
  transform:translateY(10px); transition:.18s;
}
.modal-bg.show .modal{transform:translateY(0);}
.modal-lg{max-width:760px;}
.modal-head{
  display:flex; align-items:center; justify-content:space-between; padding:16px 18px;
  border-bottom:1px solid var(--border-soft); position:sticky; top:0; background:var(--bg-elev); z-index:2;
}
.modal-head h3{font-family:var(--font-display); font-weight:700; font-size:19px; text-transform:uppercase;}
.modal-close{width:28px; height:28px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); display:flex; align-items:center; justify-content:center;}
.modal-body{padding:18px;}
.modal-foot{display:flex; justify-content:flex-end; gap:8px; padding:14px 18px; border-top:1px solid var(--border-soft); position:sticky; bottom:0; background:var(--bg-elev);}

/* ---------- toast ---------- */
#toast-stack{position:fixed; bottom:18px; right:18px; z-index:400; display:flex; flex-direction:column; gap:8px;}
.toast{
  background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--teal);
  padding:11px 16px; border-radius:var(--radius-sm); font-size:13px; box-shadow:var(--shadow);
  animation:toastIn .2s ease; max-width:300px;
}
.toast.bad{border-left-color:var(--red);}
@keyframes toastIn{from{opacity:0; transform:translateX(16px);} to{opacity:1; transform:translateX(0);}}

/* ---------- empty state ---------- */
.empty{text-align:center; padding:50px 20px; color:var(--text-dim);}
.empty .ei{font-size:34px; margin-bottom:10px; opacity:.6;}
.empty .et{font-family:var(--font-display); font-weight:700; font-size:18px; text-transform:uppercase; margin-bottom:4px; color:var(--text);}
.empty .ed{font-size:12.5px; max-width:340px; margin:0 auto;}

/* ---------- search/filter bar ---------- */
.toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px;}
.toolbar input[type=search], .toolbar select{
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:8px 12px; border-radius:var(--radius-sm); font-size:13px;
}
.toolbar input[type=search]{flex:1; min-width:160px;}

/* ---------- kanban ---------- */
.kanban{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; align-items:start;}
@media (max-width:980px){.kanban{grid-template-columns:1fr 1fr;}}
@media (max-width:620px){.kanban{grid-template-columns:1fr;}}
.kanban-col{background:var(--bg-elev); border:1px solid var(--border-soft); border-radius:var(--radius); padding:10px; min-height:120px;}
.kanban-col h4{
  font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--text-dim);
  display:flex; justify-content:space-between; padding:4px 4px 10px;
}
.kanban-col h4 .cnt{background:var(--surface); padding:1px 7px; border-radius:10px; font-family:var(--font-mono);}
.job-card{
  background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius-sm);
  padding:11px; margin-bottom:9px; cursor:grab; transition:.15s; border-left:3px solid var(--border);
}
.job-card:hover{border-color:var(--amber); transform:translateX(1px);}
.job-card.claim{border-left-color:var(--blue);}
.job-card .jc-top{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px;}
.job-card .plate{font-family:var(--font-mono); font-weight:700; font-size:13px; background:var(--bg-elev); padding:2px 7px; border-radius:4px; letter-spacing:.5px;}
.job-card .jc-cust{font-size:12.5px; font-weight:600; margin-bottom:2px;}
.job-card .jc-desc{font-size:11.5px; color:var(--text-dim); line-height:1.3; margin-bottom:7px;}
.job-card .jc-foot{display:flex; justify-content:space-between; align-items:center; font-size:10.5px; color:var(--text-faint);}
.kanban-col.dragover{background:var(--amber-glow);}

/* ---------- gauge svg shared ---------- */
.gauge-num{font-family:var(--font-mono); font-weight:700;}

/* ---------- vehicle health bar ---------- */
.health-row{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
.health-label{width:108px; flex-shrink:0; font-size:12px; color:var(--text-dim);}
.health-track{flex:1; height:7px; background:var(--gauge-track); border-radius:4px; overflow:hidden;}
.health-fill{height:100%; border-radius:4px; transition:.3s;}
.health-pct{width:38px; text-align:right; font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim);}

/* ---------- timeline ---------- */
.timeline{position:relative; padding-left:22px;}
.timeline::before{content:'';position:absolute; left:6px; top:4px; bottom:4px; width:2px; background:var(--border);}
.tl-item{position:relative; padding-bottom:18px;}
.tl-item::before{content:''; position:absolute; left:-22px; top:3px; width:11px; height:11px; border-radius:50%; background:var(--amber); border:2px solid var(--bg-elev);}
.tl-date{font-family:var(--font-mono); font-size:11px; color:var(--text-faint); margin-bottom:2px;}
.tl-title{font-weight:700; font-size:13.5px; margin-bottom:3px;}
.tl-desc{font-size:12px; color:var(--text-dim); line-height:1.4;}

/* ---------- stepper (customer job tracking) ---------- */
.stepper{display:flex; align-items:flex-start; gap:0; margin:18px 0;}
.step{flex:1; text-align:center; position:relative;}
.step .sdot{
  width:30px; height:30px; border-radius:50%; background:var(--gauge-track); color:var(--text-faint);
  display:flex; align-items:center; justify-content:center; margin:0 auto 8px; font-size:13px; font-weight:700;
  border:2px solid var(--gauge-track); position:relative; z-index:2;
}
.step .sline{position:absolute; top:15px; left:-50%; width:100%; height:2px; background:var(--gauge-track); z-index:1;}
.step:first-child .sline{display:none;}
.step.done .sdot{background:var(--teal); border-color:var(--teal); color:#0A1F15;}
.step.done .sline{background:var(--teal);}
.step.active .sdot{background:var(--amber); border-color:var(--amber); color:#1A1207; box-shadow:0 0 0 4px var(--amber-glow);}
.step .slabel{font-size:11px; color:var(--text-dim); font-weight:600;}
.step.done .slabel,.step.active .slabel{color:var(--text);}

/* ---------- mobile mechanic/customer specific ---------- */
.mobile-shell{max-width:460px; margin:0 auto;}
.checklist-item{
  display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--border-soft);
}
.checklist-item:last-child{border-bottom:none;}
.tri-toggle{display:flex; gap:4px;}
.tri-btn{width:30px; height:30px; border-radius:6px; border:1px solid var(--border); background:var(--surface); font-size:13px; display:flex; align-items:center; justify-content:center; color:var(--text-faint);}
.tri-btn.sel-good{background:var(--teal-dim); border-color:var(--teal); color:var(--teal);}
.tri-btn.sel-warn{background:var(--amber-glow); border-color:var(--amber); color:var(--amber);}
.tri-btn.sel-bad{background:var(--red-dim); border-color:var(--red); color:var(--red);}

/* ---------- print invoice ---------- */
@media print{
  body *{visibility:hidden;}
  #print-area, #print-area *{visibility:visible;}
  #print-area{position:absolute; top:0; left:0; width:100%; padding:20px;}
}

.muted{color:var(--text-dim);}
.tag-list{display:flex; flex-wrap:wrap; gap:6px;}
.chip{font-size:11px; background:var(--surface-2); border:1px solid var(--border-soft); padding:3px 9px; border-radius:20px;}
</style>

  let raw = localStorage.getItem(DB_KEY);

/* =====================================================================
   2B. CLOUD SYNC — Firebase (Firestore + Auth + Storage), optional.
   App is fully usable on localStorage alone; connecting Firebase turns
   on real-time multi-device sync (e.g. mechanic updates job → owner &
   customer see it live). Single mirrored document per workshop under
   collection "automoto", doc id = settings.workshopId.
   ===================================================================== */
let FB = { app:null, db:null, auth:null, storage:null, connected:false, _debounce:null, _applyingRemote:false };

function loadFbConfigFromSettings(){
  const s = DB.settings;
  if(!s.fbApiKey || !s.fbProjectId) return null;
  return { apiKey:s.fbApiKey, authDomain:s.fbAuthDomain || (s.fbProjectId+'.firebaseapp.com'),
    projectId:s.fbProjectId, storageBucket:s.fbStorageBucket || (s.fbProjectId+'.appspot.com'),
    messagingSenderId:s.fbMessagingSenderId, appId:s.fbAppId };
}
function updateSyncPill(){
  const el = document.getElementById('sync-pill'); if(!el) return;
  if(FB.connected){ el.textContent = '🟢 ' + (CUR_LANG==='en'?'Synced':CUR_LANG==='zh'?'已同步':'Disync'); el.className='sync-pill live'; }
  else { el.textContent = '⚪ ' + (CUR_LANG==='en'?'Local':CUR_LANG==='zh'?'本地':'Lokal'); el.className='sync-pill'; }
}
function connectFirebase(silent){
  const config = loadFbConfigFromSettings();
  if(!config){ if(!silent) toast('Sila isi sekurang-kurangnya API Key & Project ID.', true); return; }
  try{
    if(!FB.app){ FB.app = firebase.initializeApp(config); }
    FB.db = firebase.firestore();
    FB.auth = firebase.auth();
    FB.storage = firebase.storage();
    FB.connected = true;
    attachFirestoreListener();
    firebase.auth().signInAnonymously().catch(e=>console.warn('anon auth failed', e));
    if(!silent) toast('Firebase disambung — sync awan aktif. ☁️');
    updateSyncPill();
  }catch(e){
    console.error(e); FB.connected = false; updateSyncPill();
    if(!silent) toast('Gagal sambung Firebase: ' + e.message, true);
  }
}
function disconnectFirebase(){
  FB.connected = false; updateSyncPill(); toast('Cloud sync dimatikan. Data terus disimpan secara lokal.');
}
function queueRemotePush(){
  clearTimeout(FB._debounce);
  FB._debounce = setTimeout(()=>{
    if(!FB.connected || FB._applyingRemote) return;
    FB.db.collection('automoto').doc(DB.settings.workshopId).set(DB)
      .then(()=> updateSyncPill())
      .catch(e=>{ console.error('Firestore push failed', e); toast('Sync awan gagal: ' + e.message, true); });
  }, 700);
}
function attachFirestoreListener(){
  FB.db.collection('automoto').doc(DB.settings.workshopId).onSnapshot(snap=>{
    if(snap.exists){
      FB._applyingRemote = true;
      DB = snap.data();
      localStorage.setItem(DB_KEY, JSON.stringify(DB));
      if(SESSION.portal) renderCurrentView();
      buildBranchSelector();
      FB._applyingRemote = false;
    } else {
      // first connect — seed remote with current local data
      FB.db.collection('automoto').doc(DB.settings.workshopId).set(DB);
    }
  }, err=>{ console.error('Firestore listen error', err); FB.connected=false; updateSyncPill(); });
}
function pushLocalToCloud(){
  if(!FB.connected){ toast('Sambung Firebase dahulu.', true); return; }
  FB.db.collection('automoto').doc(DB.settings.workshopId).set(DB).then(()=> toast('Data tempatan dimuat naik ke awan. ☁️')).catch(e=> toast('Gagal: '+e.message, true));
}

/* =====================================================================
   2C. WHATSAPP BUSINESS API — sends via Meta Graph API if configured,
   otherwise falls back to wa.me click-to-chat (always works, no setup).
   waBtn() registers the message in a queue to avoid HTML-attribute
   string-escaping issues with dynamic multi-line text.
   ===================================================================== */
let WA_QUEUE = [];
function waBtn(phone, msg, label, cls){
  const idx = WA_QUEUE.push({phone,msg}) - 1;
  return `<button class="${cls||'btn btn-sm btn-primary'}" onclick="sendOrOpenWA(${idx}, this)">${label}</button>`;
}
async function sendOrOpenWA(idx, btnEl){
  const {phone, msg} = WA_QUEUE[idx];
  const s = DB.settings;
  if(s.waApiToken && s.waPhoneNumberId){
    const original = btnEl ? btnEl.textContent : '';
    if(btnEl){ btnEl.textContent = '...'; btnEl.disabled = true; }
    const ok = await sendWhatsAppAPI(phone, msg);
    if(btnEl){ btnEl.textContent = original; btnEl.disabled = false; }
    if(ok){ toast('Mesej dihantar terus via WhatsApp API ✅'); return; }
    toast('API gagal — membuka WhatsApp manual...', true);
  }
  window.open(waLink(phone, msg), '_blank');
}
async function sendWhatsAppAPI(phone, message){
  const s = DB.settings;
  const clean = (phone||'').replace(/[^0-9]/g,'').replace(/^0/,'60');
  try{
    const res = await fetch(`https://graph.facebook.com/v19.0/${s.waPhoneNumberId}/messages`, {
      method:'POST',
      headers:{ 'Authorization':`Bearer ${s.waApiToken}`, 'Content-Type':'application/json' },
      body: JSON.stringify({ messaging_product:'whatsapp', to:clean, type:'text', text:{ body:message } })
    });
    return res.ok;
  }catch(e){ console.error('WA API send failed', e); return false; }
}
async function testWaApi(){
  const s = DB.settings;
  if(!s.waApiToken || !s.waPhoneNumberId){ toast('Isi Token & Phone Number ID dahulu.', true); return; }
  const phone = prompt('Masukkan no. telefon untuk test (cth: 0123456789):');
  if(!phone) return;
  const ok = await sendWhatsAppAPI(phone, 'Test mesej dari AutoMoto Workshop ✅ — sambungan WhatsApp Business API berjaya.');
  toast(ok? 'Mesej test berjaya dihantar!' : 'Gagal hantar — semak Token/Phone Number ID.', !ok);
}

   Firebase Storage when connected, base64 localStorage fallback.
   ===================================================================== */
function triggerPhotoUpload(jobId){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
  input.onchange = (e)=> { if(e.target.files[0]) handlePhotoFile(jobId, e.target.files[0]); };
  input.click();
}
function compressImage(dataUrl, maxDim, quality, cb){
  const img = new Image();
  img.onload = ()=>{
    let w = img.width, h = img.height;
    if(w > h && w > maxDim){ h = Math.round(h * maxDim/w); w = maxDim; }
    else if(h > maxDim){ w = Math.round(w * maxDim/h); h = maxDim; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.onerror = ()=> cb(dataUrl);
  img.src = dataUrl;
}
function handlePhotoFile(jobId, file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    compressImage(e.target.result, 900, 0.72, (compressed)=>{
      const j = DB.jobCards.find(x=>x.id===jobId); j.photos = j.photos || [];
      const photo = { id: uid('ph'), dataUrl: compressed, ts: Date.now() };
      j.photos.push(photo);
      saveDB();
      if(FB.connected && FB.storage){ uploadPhotoToStorage(jobId, photo); }
      if(document.getElementById('active-modal')) openMechJobDetail(jobId);
      toast('Foto ditambah.');
    });
  };
  reader.readAsDataURL(file);
}
function uploadPhotoToStorage(jobId, photo){
  try{
    const ref = FB.storage.ref().child(`workshops/${DB.settings.workshopId}/jobs/${jobId}/${photo.id}.jpg`);
    ref.putString(photo.dataUrl, 'data_url').then(()=>ref.getDownloadURL()).then(url=>{
      const j = DB.jobCards.find(x=>x.id===jobId); if(!j) return;
      const p = j.photos.find(p=>p.id===photo.id);
      if(p){ p.url = url; delete p.dataUrl; saveDB(); } // swap heavy base64 for hosted URL once uploaded
    }).catch(e=> console.warn('Storage upload failed, keeping local copy', e));
  }catch(e){ console.warn(e); }
}
function viewPhoto(url){ openModal(`<div class="modal-head"><h3>Foto</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><img src="${url}" style="width:100%; border-radius:8px;"></div>`); }

/* =====================================================================
   2E. PWA — service worker (offline cache) + install prompt capture
   ===================================================================== */
let DEFERRED_INSTALL_PROMPT = null;
function registerServiceWorker(){
  if(!('serviceWorker' in navigator)) return;
  const swSrc = `
    const CACHE='automoto-cache-v1';
    self.addEventListener('install', e=> self.skipWaiting());
    self.addEventListener('activate', e=> self.clients.claim());
    self.addEventListener('fetch', e=>{
      if(e.request.method!=='GET') return;
      e.respondWith(
        caches.match(e.request).then(cached=>{
          const fetchPromise = fetch(e.request).then(res=>{
            if(res && res.status===200){ const clone=res.clone(); caches.open(CACHE).then(c=>c.put(e.request, clone)); }
            return res;
          }).catch(()=> cached);
          return cached || fetchPromise;
        })
      );
    });
  `;
  try{
    const blob = new Blob([swSrc], {type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(e=> console.warn('SW registration failed', e));
  }catch(e){ console.warn('SW unsupported in this context', e); }
}
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  DEFERRED_INSTALL_PROMPT = e;
  const btn = document.getElementById('install-btn');
  if(btn) btn.classList.remove('hidden');
});
function installApp(){
  if(!DEFERRED_INSTALL_PROMPT){ toast('App ini sudah dipasang atau pelayar tidak menyokong pemasangan terus.'); return; }
  DEFERRED_INSTALL_PROMPT.prompt();
  DEFERRED_INSTALL_PROMPT.userChoice.then(()=>{ DEFERRED_INSTALL_PROMPT = null; document.getElementById('install-btn').classList.add('hidden'); });
}


/* ---------------------------------------------------------------------
   4. MAINTENANCE ENGINE  ★ core differentiator ★
   For every vehicle, compute per-service-type due status using BOTH
   mileage interval and time interval (whichever comes first — matches
   how Malaysian workshops actually advise customers, e.g. "5000km or
   6 bulan, mana dulu").
   --------------------------------------------------------------------- */
function monthsBetween(d1,d2){
  const a=new Date(d1), b=new Date(d2);
  return (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth()) + (b.getDate()-a.getDate())/30;
}
function estimateDailyKm(vehicle){
  // crude average usage estimate from last recorded service to now; fallback to 35km/day (~1050km/month, typical KL commuter)
  const days = Math.max(1, Math.round((new Date() - new Date(vehicle.lastServiceDate)) / 86400000));
  const kmSince = Math.max(0, vehicle.mileage - vehicle.lastServiceMileage);
  const rate = kmSince>0 ? kmSince/days : 35;
  return rate;
}
function computeVehicleDue(vehicle){
  const out = [];
  DB.serviceTypes.forEach(svc=>{
    const kmSinceService = vehicle.mileage - vehicle.lastServiceMileage;
    const kmRemaining = svc.intervalKm - kmSinceService;
    const monthsSince = monthsBetween(vehicle.lastServiceDate, new Date());
    const monthsRemaining = svc.intervalMonth - monthsSince;
    const dailyKm = estimateDailyKm(vehicle);
    const daysToKmDue = dailyKm>0 ? Math.round((kmRemaining)/dailyKm) : 9999;
    const daysToMonthDue = Math.round(monthsRemaining*30);
    const daysRemaining = Math.min(daysToKmDue, daysToMonthDue);
    let status = 'ok';
    if(daysRemaining <= 0) status = 'overdue';
    else if(daysRemaining <= 14) status = 'dueSoon';
    const pctUsed = Math.max(0, Math.min(120, Math.round(100 - (daysRemaining / ((svc.intervalMonth*30))*100) )));
    out.push({ svc, kmRemaining, monthsRemaining, daysRemaining, status, pctUsed: Math.min(100,Math.max(0,100-Math.max(0,Math.round(daysRemaining/ (svc.intervalMonth*30) *100)))) });
  });
  return out.sort((a,b)=> a.daysRemaining - b.daysRemaining);
}
function vehicleOverallHealth(vehicle){
  const due = computeVehicleDue(vehicle);
  const worst = due[0];
  if(!worst) return {status:'ok', pct:100, worst:null};
  let pct;
  if(worst.status==='overdue') pct = Math.max(2, 20 - Math.min(20,Math.abs(worst.daysRemaining)/5));
  else if(worst.status==='dueSoon') pct = 35 + (14-Math.max(0,worst.daysRemaining))*2;
  else pct = Math.min(98, 60 + Math.min(38, worst.daysRemaining/4));
  return { status:worst.status, pct:Math.round(pct), worst };
}
function fleetSummary(){
  const list = visibleVehicles();
  let overdue=0, dueSoon=0, ok=0;
  list.forEach(v=>{ const h=vehicleOverallHealth(v); if(h.status==='overdue')overdue++; else if(h.status==='dueSoon')dueSoon++; else ok++; });
  return {overdue, dueSoon, ok, total:list.length};
}
function visibleVehicles(){ return DB.vehicles.filter(v=> v.branchId === SESSION.branchId); }
function visibleJobs(){ return DB.jobCards.filter(j=> j.branchId === SESSION.branchId); }
function visibleCustomerIds(){ return new Set(visibleVehicles().map(v=>v.customerId)); }

/* ---------------------------------------------------------------------
   4B. LOYALTY & REWARDS ENGINE  ★ retention layer ★
   Points earned per RM spent on paid invoices; auto tier upgrade;
   referral bonus when a referred customer's first invoice is paid.
   Workshop-specific loyalty (every point/tier is local to this bengkel,
   unlike a marketplace-wide scheme) — directly rewards repeat visits,
   reinforcing the maintenance-reminder loop into a habit.
   --------------------------------------------------------------------- */
function calcTier(points){
  const th = DB.settings.tierThresholds || {Bronze:0,Silver:300,Gold:600};
  if(points >= th.Gold) return 'Gold';
  if(points >= th.Silver) return 'Silver';
  return 'Bronze';
}
function tierColor(tier){ return tier==='Gold' ? '#F2C94C' : tier==='Silver' ? '#C7CBD1' : '#C98A4B'; }
function awardPoints(customerId, amountRM){
  const c = DB.customers.find(x=>x.id===customerId); if(!c) return;
  c.points = (c.points||0) + Math.round(amountRM * (DB.settings.pointsPerRM||1));
  const prevTier = c.tier; c.tier = calcTier(c.points);
  // referral bonus: if this is this customer's first paid invoice and they were referred, reward the referrer
  if(c.referredBy){
    const paidCount = DB.invoices.filter(i=>i.customerId===customerId && i.paid).length;
    if(paidCount<=1){
      const ref = DB.customers.find(x=>x.id===c.referredBy);
      if(ref){ ref.points = (ref.points||0) + (DB.settings.referralBonusPoints||50); ref.tier = calcTier(ref.points); }
    }

/* ---------------------------------------------------------------------
   5. GAUGE — instrument-cluster style SVG (signature visual element)
   pct: 0-100 (100 = full health / just serviced, 0 = overdue)
   --------------------------------------------------------------------- */
function gaugeColor(pct){
  if(pct <= 20) return getCss('--red');
  if(pct <= 45) return getCss('--amber');
  return getCss('--teal');
}
function getCss(varName){ return getComputedStyle(document.documentElement).getPropertyValue(varName).trim(); }
function renderGauge(pct, opts){
  opts = opts || {};
  const size = opts.size || 96;
  const stroke = opts.stroke || 9;
  const r = (size/2) - stroke;
  const cx = size/2, cy = size/2;
  const startAngle = -210, endAngle = 30; // 240-degree sweep, automotive gauge style
  const sweep = endAngle - startAngle;
  const valAngle = startAngle + (sweep * Math.max(0,Math.min(100,pct))/100);
  const polar = (ang)=>{ const rad = ang*Math.PI/180; return [cx + r*Math.cos(rad), cy + r*Math.sin(rad)]; };
  const [sx,sy] = polar(startAngle);
  const [ex,ey] = polar(endAngle);
  const [vx,vy] = polar(valAngle);
  const largeArc = (sweep) > 180 ? 1 : 0;
  const valLargeArc = (valAngle - startAngle) > 180 ? 1 : 0;
  const color = gaugeColor(pct);
  const track = getCss('--gauge-track');
  const label = opts.label || '';
  const sub = opts.sub || '';
  const labelSize = opts.labelSize || Math.round(size*0.22);
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <path d="M ${sx} ${sy} A ${r} ${r} 0 ${largeArc} 1 ${ex} ${ey}" fill="none" stroke="${track}" stroke-width="${stroke}" stroke-linecap="round"/>
    <path d="M ${sx} ${sy} A ${r} ${r} 0 ${valLargeArc} 1 ${vx} ${vy}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"/>
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-family="JetBrains Mono" font-weight="700" font-size="${labelSize}" fill="${getCss('--text')}">${label}</text>
    ${sub?`<text x="${cx}" y="${cy+size*0.17}" text-anchor="middle" font-family="Inter" font-size="${Math.round(size*0.09)}" fill="${getCss('--text-faint')}">${sub}</text>`:''}
  </svg>`;
}

function toast(msg, bad){
  const el = document.createElement('div');
  el.className = 'toast' + (bad?' bad':'');
  el.textContent = msg;
  document.getElementById('toast-stack').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='.25s'; setTimeout(()=>el.remove(),250); }, 2600);
}
function openModal(html, opts){
  closeModal();

  bg.className = 'modal-bg';
  bg.id = 'active-modal';
  bg.innerHTML = `<div class="modal ${opts&&opts.lg?'modal-lg':''}">${html}</div>`;
  bg.addEventListener('click', (e)=>{ if(e.target===bg) closeModal(); });
  document.getElementById('modal-root').appendChild(bg);

}

let MAINT_FILTER = 'all';
function renderMaintenance(){
  const vehicles = visibleVehicles();
  const rows = vehicles.map(v=>({v, h:vehicleOverallHealth(v)}));
  const filtered = MAINT_FILTER==='all'? rows : rows.filter(r=>r.h.status===MAINT_FILTER);
  filtered.sort((a,b)=> (a.h.worst?.daysRemaining ?? 9999) - (b.h.worst?.daysRemaining ?? 9999));

  return `
    <div class="page-head">
      <div><h2 data-i18n="maint.title">${t('maint.title')}</h2><div class="sub" data-i18n="maint.sub">${t('maint.sub')}</div></div>
      <div style="display:flex; gap:8px;">
        <button class="btn" onclick="openServiceTypesModal()" data-i18n="btn.addService">${t('btn.addService')}</button>
        <button class="btn btn-primary" onclick="bulkRemind()" data-i18n="btn.bulkRemind">${t('btn.bulkRemind')}</button>
      </div>
    </div>

    <div class="toolbar">
      <select onchange="MAINT_FILTER=this.value; renderCurrentView();">
        <option value="all" ${MAINT_FILTER==='all'?'selected':''}>Semua Kenderaan</option>
        <option value="overdue" ${MAINT_FILTER==='overdue'?'selected':''}>${t('status.overdue')}</option>
        <option value="dueSoon" ${MAINT_FILTER==='dueSoon'?'selected':''}>${t('status.dueSoon')}</option>
        <option value="ok" ${MAINT_FILTER==='ok'?'selected':''}>${t('status.ok')}</option>
      </select>
      <span class="muted" style="font-size:12.5px;">${filtered.length} kenderaan</span>
    </div>

    <div class="grid g3" id="maint-grid">
      ${filtered.length===0? `<div class="empty" style="grid-column:1/-1;"><div class="ei">🚗</div><div class="ed">Tiada kenderaan dalam kategori ini.</div></div>` :
      filtered.map(({v,h})=>{
        const due = computeVehicleDue(v);
        return `
        <div class="card">
          <div style="display:flex; gap:12px; align-items:center; margin-bottom:10px;">
            ${renderGauge(h.pct, {size:64, stroke:6, label:'', labelSize:1})}
            <div style="flex:1;">
              <div class="mono" style="font-weight:800; font-size:14px;">${v.plate}</div>
              <div style="font-size:12px; color:var(--text-dim);">${v.make} ${v.model}</div>
              <div style="font-size:11px; color:var(--text-faint);">${custName(v.customerId)}</div>
            </div>
            ${statusBadge(h.status)}
          </div>
          ${due.slice(0,3).map(d=>`
            <div class="health-row">
              <span class="health-label" title="${svcName(d.svc.id)}">${svcName(d.svc.id).slice(0,16)}${svcName(d.svc.id).length>16?'…':''}</span>
              <div class="health-track"><div class="health-fill" style="width:${d.pctUsed}%; background:${d.status==='overdue'?'var(--red)':d.status==='dueSoon'?'var(--amber)':'var(--teal)'};"></div></div>
              <span class="health-pct">${d.daysRemaining<0? Math.abs(Math.round(d.daysRemaining))+'h lewat' : Math.round(d.daysRemaining)+'h'}</span>
            </div>`).join('')}
          <div style="display:flex; gap:6px; margin-top:10px;">
            <button class="btn btn-sm" style="flex:1;" onclick="openVehicleModal('${v.id}')">${t('btn.view')}</button>
            ${waBtn(custPhone(v.customerId), reminderMsg(v,h), t('btn.sendWa'), 'btn btn-sm btn-primary')}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}
function reminderMsg(v,h){
  const name = custName(v.customerId).split(' ')[0];
  const svc = h.worst? svcName(h.worst.svc.id) : 'servis berkala';
  if(h.status==='overdue') return `Hai ${name}, ini AutoMoto Workshop 🔧. Kereta anda ${v.plate} sudah lewat untuk ${svc}. Jom jadualkan masa untuk datang servis — boleh kami bantu tetapkan tarikh?`;
  return `Hai ${name}, peringatan mesra dari AutoMoto Workshop 🔧. Kereta anda ${v.plate} akan due untuk ${svc} tidak lama lagi. Nak kami reserve slot untuk anda?`;
}
function bulkRemind(){
  const vehicles = visibleVehicles().map(v=>({v,h:vehicleOverallHealth(v)})).filter(x=>x.h.status!=='ok');
  if(vehicles.length===0){ toast('Tiada kenderaan perlu peringatan sekarang.'); return; }
  openModal(`
    <div class="modal-head"><h3>${t('btn.bulkRemind')}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p class="field-hint" style="margin-bottom:10px;">${vehicles.length} kenderaan perlu peringatan. Klik WhatsApp untuk hantar satu-satu (pratonton mesej automatik).</p>
      ${vehicles.map(({v,h})=>`
        <div style="display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border-soft);">
          <span class="mono" style="font-weight:700; font-size:12.5px; width:90px;">${v.plate}</span>
          <span style="flex:1; font-size:12.5px;">${custName(v.customerId)}</span>
          ${statusBadge(h.status)}
          ${waBtn(custPhone(v.customerId), reminderMsg(v,h), '💬 WA', 'btn btn-sm btn-primary')}
        </div>`).join('')}
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">${t('btn.close')}</button></div>
  `, {lg:true});
}
function openServiceTypesModal(){

  const name=document.getElementById('cf-name').value.trim();
  if(!name){ toast('Sila masukkan nama.', true); return; }

  if(id){ Object.assign(DB.customers.find(c=>c.id===id), data); }
  else { DB.customers.push({ id: uid('cu'), ...data }); }

  DB.vehicles = DB.vehicles.filter(v=>v.customerId!==id);

}

            </td>

      </table>

}
function generateInvoiceFromJob(jobId){
  const j = DB.jobCards.find(x=>x.id===jobId); if(!j) return;
  const subtotal = (j.laborTotal||0) + (j.partsTotal||0);
  const sstOn = DB.settings.sstRegistered;
  const sst = sstOn ? Math.round(subtotal * DB.settings.sstRate)/100 : 0;
  const inv = { id: uid('inv'), jobCardId:j.id, vehicleId:j.vehicleId, customerId:j.customerId,
    date: new Date().toISOString().slice(0,10), subtotal, sst, total: subtotal+sst, paid:false, payMethod:'', branchId:j.branchId };
  DB.invoices.unshift(inv); saveDB(); renderCurrentView(); toast('Invois dijana.'); viewInvoice(inv.id);
}
function markPaid(id){
  const i=DB.invoices.find(x=>x.id===id);
  if(i){
    i.paid=true; i.payMethod='DuitNow';
    if(DB.settings.loyaltyEnabled){ awardPoints(i.customerId, i.total); }
    saveDB(); renderCurrentView(); toast('Invois ditanda dibayar.' + (DB.settings.loyaltyEnabled? ' Mata ganjaran diberikan. 🎉':''));
  }
}

function renderReports(){
  const invs = DB.invoices.filter(i=>i.branchId===SESSION.branchId);
  const totalRev = invs.reduce((s,i)=>s+i.total,0);
  const jobs = visibleJobs();
  // revenue by service type (approx via job services)
  const svcCount = {};
  jobs.forEach(j=> (j.services||[]).forEach(s=> svcCount[s]=(svcCount[s]||0)+1));
  const topSvc = Object.entries(svcCount).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxCount = Math.max(1, ...topSvc.map(x=>x[1]));
  // top customers by job count
  const custCount = {};
  jobs.forEach(j=> custCount[j.customerId]=(custCount[j.customerId]||0)+1);
  const topCust = Object.entries(custCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  // retention / win-back
  const vehicles = visibleVehicles();
  const winback = vehicles.filter(v=> monthsBetween(v.lastServiceDate, new Date()) >= 6)
    .sort((a,b)=> monthsBetween(b.lastServiceDate,new Date()) - monthsBetween(a.lastServiceDate,new Date()));
  const rating = workshopRating();
  const reviews = jobs.filter(j=>j.reviewText).sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).slice(0,5);
  const leaderboard = [...visibleCustomerIds()].map(id=>DB.customers.find(c=>c.id===id)).filter(Boolean).sort((a,b)=>(b.points||0)-(a.points||0)).slice(0,6);

  return `
    <div class="page-head"><div><h2 data-i18n="rep.title">${t('rep.title')}</h2><div class="sub" data-i18n="rep.sub">${t('rep.sub')}</div></div></div>
    <div class="grid g4" style="margin-bottom:16px;">
      <div class="card"><div class="kt">Jumlah Hasil</div><div class="kv" style="font-family:var(--font-display); font-size:26px; font-weight:800;">${fmtRM(totalRev)}</div></div>
      <div class="card"><div class="kt">Jumlah Job</div><div class="kv" style="font-family:var(--font-display); font-size:26px; font-weight:800;">${jobs.length}</div></div>
      <div class="card"><div class="kt">Purata / Job</div><div class="kv" style="font-family:var(--font-display); font-size:26px; font-weight:800;">${fmtRM(jobs.length? totalRev/Math.max(1,invs.length):0)}</div></div>
      <div class="card"><div class="kt">Rating Bengkel</div><div class="kv" style="font-family:var(--font-display); font-size:26px; font-weight:800; color:var(--amber);">${rating.count? rating.avg+' / 5':'—'}</div><div class="kn">${rating.count} ulasan</div></div>
    </div>
    <div class="grid g2" style="margin-bottom:14px;">
      <div class="card">
        <b style="font-family:var(--font-display); text-transform:uppercase; font-size:15px; display:block; margin-bottom:12px;">Perkhidmatan Popular</b>
        ${topSvc.length===0?`<p class="muted" style="font-size:12.5px;">Tiada data lagi.</p>`:
        topSvc.map(([id,count])=>`
          <div class="health-row"><span class="health-label" style="width:160px;">${svcName(id)}</span>
          <div class="health-track"><div class="health-fill" style="width:${count/maxCount*100}%; background:var(--amber);"></div></div>
          <span class="health-pct">${count}</span></div>`).join('')}
      </div>
      <div class="card">
        <b style="font-family:var(--font-display); text-transform:uppercase; font-size:15px; display:block; margin-bottom:12px;">${t('dash.winback')}</b>
        <p class="field-hint" style="margin-bottom:10px;">Pelanggan tidak servis 6+ bulan — risiko hilang ke bengkel lain.</p>
        ${winback.length===0?`<p class="muted" style="font-size:12.5px;">Tiada pelanggan dalam senarai ini. 👍</p>`:
        winback.slice(0,8).map(v=>`
          <div style="display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border-soft);">
            <span class="mono" style="font-weight:700; font-size:12px; width:85px;">${v.plate}</span>
            <span style="flex:1; font-size:12px;">${custName(v.customerId)}</span>
            <span class="badge badge-bad">${Math.round(monthsBetween(v.lastServiceDate,new Date()))} bln</span>
            ${waBtn(custPhone(v.customerId), `Hai ${custName(v.customerId).split(' ')[0]}, lama tak jumpa! Kereta ${v.plate} mungkin dah due servis. Ada promo khas untuk pelanggan lama kami — nak booking slot?`, '💬', 'btn btn-sm btn-primary')}
          </div>`).join('')}
      </div>
    </div>
    <div class="grid g2">
      <div class="card">
        <b style="font-family:var(--font-display); text-transform:uppercase; font-size:15px; display:block; margin-bottom:12px;">⭐ Ulasan Terkini</b>
        ${reviews.length===0?`<p class="muted" style="font-size:12.5px;">Tiada ulasan lagi.</p>`:
        reviews.map(j=>`
          <div style="padding:9px 0; border-bottom:1px solid var(--border-soft);">
            <div style="display:flex; justify-content:space-between;"><span style="color:var(--amber); font-size:13px;">${starRow(j.rating)}</span><span class="muted" style="font-size:11px;">${custName(j.customerId)}</span></div>
            <div style="font-size:12.5px; margin-top:3px;">${j.reviewText}</div>
          </div>`).join('')}
      </div>
      <div class="card">
        <b style="font-family:var(--font-display); text-transform:uppercase; font-size:15px; display:block; margin-bottom:12px;">🏆 Papan Pendahulu Ganjaran</b>
        ${leaderboard.length===0?`<p class="muted" style="font-size:12.5px;">Tiada data lagi.</p>`:
        leaderboard.map((c,idx)=>`
          <div style="display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border-soft);">
            <span class="mono muted" style="width:20px;">#${idx+1}</span>
            <span style="flex:1; font-size:12.5px;">${c.name}</span>
            <span style="font-size:16px;">${c.tier==='Gold'?'🥇':c.tier==='Silver'?'🥈':'🥉'}</span>
            <span class="mono" style="font-size:12px; width:60px; text-align:right;">${c.points||0} pts</span>
          </div>`).join('')}
      </div>
    </div>
  `;
}

function setInspection(jobId, key, val){
  const j = DB.jobCards.find(x=>x.id===jobId); j.inspection = j.inspection||{};

  saveDB(); openMechJobDetail(jobId);

function addMechPart(jobId){
  const partId = document.getElementById('mech-part-pick').value;
  const j = DB.jobCards.find(x=>x.id===jobId); j.partsUsed = j.partsUsed||[]; j.partsUsed.push(partId);
  const p = DB.inventory.find(x=>x.id===partId); if(p && p.qty>0) p.qty--;
  saveDB(); openMechJobDetail(jobId);
}
function mechStartJob(jobId){ const j=DB.jobCards.find(x=>x.id===jobId); j.status='progress'; saveDB(); closeModal(); renderCurrentView(); toast('Job dimulakan.'); }
function mechCompleteJob(jobId){
  const j=DB.jobCards.find(x=>x.id===jobId); j.status='completed'; saveDB(); closeModal(); renderCurrentView();

/* ---------------------------------------------------------------------
   20B. RATINGS & REVIEWS  ★ trust layer — TUHU-style post-order rating ★
   Every delivered job can be rated once by the customer; aggregated
   into a workshop-wide quality score visible to the owner.
   --------------------------------------------------------------------- */
function quickRate(jobId, stars){
  const j = DB.jobCards.find(x=>x.id===jobId); if(!j) return;
  j.rating = stars; saveDB();
  openModal(`
    <div class="modal-head"><h3>Terima kasih! ⭐${stars}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px; margin-bottom:10px;">Ada komen tambahan? (pilihan sahaja)</p>
      <textarea id="review-text" placeholder="Kongsi pengalaman anda..."></textarea>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal(); renderCurrentView();">Langkau</button><button class="btn btn-primary" onclick="submitReview('${jobId}')">Hantar</button></div>
  `);
}
function submitReview(jobId){
  const j = DB.jobCards.find(x=>x.id===jobId);
  if(j){ j.reviewText = document.getElementById('review-text').value.trim() || null; saveDB(); }
  closeModal(); renderCurrentView(); toast('Terima kasih atas maklum balas anda! 🙏');
}
function workshopRating(){
  const rated = DB.jobCards.filter(j=>j.rating!=null && j.branchId===SESSION.branchId);
  if(rated.length===0) return { avg:0, count:0 };
  return { avg: Math.round((rated.reduce((s,j)=>s+j.rating,0)/rated.length)*10)/10, count: rated.length };
}
function starRow(rating){ return [1,2,3,4,5].map(n=> n<=rating? '★':'☆').join(''); }

/* ---------------------------------------------------------------------
   20C. DIGITAL VEHICLE HEALTH REPORT  ★ shareable trust artifact ★
   Combines latest inspection results, maintenance due status & photos
   into one shareable report — the digital equivalent of TUHU's
   "watch the whole service" transparency, designed to be sent/printed.
   --------------------------------------------------------------------- */
function openHealthReport(vehicleId){
  const v = vehicleOf(vehicleId); if(!v) return;
  const due = computeVehicleDue(v);
  const h = vehicleOverallHealth(v);
  const lastJob = DB.jobCards.filter(j=>j.vehicleId===vehicleId && (j.status==='completed'||j.status==='delivered')).sort((a,b)=>b.createdAt.localeCompare(a.createdAt))[0];
  const insp = lastJob?.inspection || {};
  const s = DB.settings;
  openModal(`
    <div class="modal-head"><h3>Laporan Kesihatan Kenderaan</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="print-area">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px;">
        <div>
          <div style="font-family:var(--font-display); font-weight:800; font-size:18px; text-transform:uppercase;">${s.workshopName}</div>
          <div class="muted" style="font-size:11px;">Laporan dijana ${new Date().toISOString().slice(0,10)}</div>
        </div>
        ${renderGauge(h.pct, {size:64, stroke:6})}
      </div>
      <div class="card card-tight" style="margin-bottom:14px;">
        <div class="mono" style="font-weight:800; font-size:16px;">${v.plate}</div>
        <div style="font-size:12.5px; color:var(--text-dim);">${v.make} ${v.model} (${v.year}) · ${v.mileage.toLocaleString()} km</div>
      </div>

      ${Object.keys(insp).length>0? `
      <b style="font-size:12px; text-transform:uppercase; color:var(--text-dim); display:block; margin-bottom:8px;">Pemeriksaan Terkini (${lastJob.createdAt})</b>
      <div class="grid g2" style="margin-bottom:16px;">
        ${INSPECTION_ITEMS.filter(it=>insp[it.k]).map(it=>`
          <div style="display:flex; align-items:center; gap:8px; font-size:12.5px;">
            <span>${insp[it.k]==='good'?'✅':insp[it.k]==='warn'?'⚠️':'❌'}</span>
            <span>${it.label[CUR_LANG]||it.label.en}</span>
          </div>`).join('')}
      </div>` : ''}

      <b style="font-size:12px; text-transform:uppercase; color:var(--text-dim); display:block; margin-bottom:8px;">Status Penyelenggaraan</b>
      ${due.map(d=>`
        <div class="health-row">
          <span class="health-label">${svcName(d.svc.id)}</span>
          <div class="health-track"><div class="health-fill" style="width:${d.pctUsed}%; background:${d.status==='overdue'?'var(--red)':d.status==='dueSoon'?'var(--amber)':'var(--teal)'};"></div></div>
          ${statusBadge(d.status)}
        </div>`).join('')}

      ${lastJob?.photos?.length? `
      <b style="font-size:12px; text-transform:uppercase; color:var(--text-dim); display:block; margin:16px 0 8px;">Foto Servis Terkini</b>
      <div style="display:flex; gap:6px; flex-wrap:wrap;">${photoThumbs(lastJob.photos)}</div>` : ''}

      <div class="card card-tight" style="margin-top:16px; background:var(--teal-dim); border-color:var(--teal); font-size:11.5px;">
        ✅ Laporan ini dijana terus dari sistem AutoMoto — telus, automatik, tiada andaian.
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="window.print()">🖨️ ${t('btn.print')}</button>
      ${waBtn(DB.settings.phone, `Boleh hantar laporan kesihatan untuk kereta ${v.plate}?`, 'Kongsi via WhatsApp', 'btn btn-primary')}
      <button class="btn" onclick="closeModal()">${t('btn.close')}</button>
    </div>
  `, {lg:true});
}

/* ---------------------------------------------------------------------
   20D. PUBLIC PRICE CATALOG  ★ TUHU-style transparent fixed pricing ★
   Accessible from the boot screen with no login — the single biggest
   trust gap in Malaysian aftermarket workshops is opaque/negotiated
   pricing. Publishing it removes that friction before first contact.
   --------------------------------------------------------------------- */
function openPriceCatalog(){
  const rating = workshopRating();
  openModal(`
    <div class="modal-head"><h3>💰 Senarai Harga Tetap</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p class="field-hint" style="margin-bottom:4px;">Harga sama sama ada anda book online atau datang terus — tiada tawar-menawar.</p>
      ${rating.count>0? `<div style="margin-bottom:14px; font-size:13px;">⭐ ${rating.avg}/5.0 <span class="muted">(${rating.count} ulasan)</span></div>`:''}
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Servis</th><th>Harga</th><th>Jaminan</th></tr></thead>
          <tbody>
          ${DB.serviceTypes.map(s=>`
            <tr><td>${s.name}</td><td class="mono" style="color:var(--amber); font-weight:700;">${fmtRM(s.price||s.laborCost)}</td>
            <td><span class="badge badge-info">${s.warrantyDays||30} hari</span></td></tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="field-hint" style="margin-top:10px;">Harga termasuk upah kerja sahaja; alat ganti dikira berasingan mengikut keperluan kenderaan.</div>
    </div>
    <div class="modal-foot">
      ${waBtn(DB.settings.phone, 'Hai, saya nampak senarai harga AutoMoto. Boleh saya tanya tentang servis untuk kereta saya?', 'Tanya via WhatsApp', 'btn btn-primary')}
      <button class="btn" onclick="closeModal()">${t('btn.close')}</button>
    </div>
  `, {lg:true});
}

/* ---------------------------------------------------------------------
   21. INIT
   --------------------------------------------------------------------- */
function init(){
  applyTheme(localStorage.getItem('aj_theme') || 'light');
  document.getElementById('lang-sel').value = CUR_LANG;
  applyI18n();
  registerServiceWorker();
  if(loadFbConfigFromSettings()){ connectFirebase(true); }
  updateSyncPill();
  if(SESSION.portal){
    enterPortal(SESSION.portal);
  }
  window.addEventListener('resize', ()=>{ if(window.innerWidth>880) document.getElementById('sidebar').classList.remove('open'); });
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
